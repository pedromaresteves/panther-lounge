<!DOCTYPE html>
<html>
<head>
  <title>Chord Diagram</title>
  <script src="https://cdn.jsdelivr.net/npm/vexchords@1.2.0/dist/vexchords.min.js"></script>
  <style>
    #chord-box {
      width: 200px;
      height: 200px;
    }
  </style>
</head>
<body>
  <div id="chord-box"></div>
  <script type="module">
    import getChord from './js/utils/chordLookup.js';

    async function renderChord() {
      const chord = await getChord('E', 'major');
      const chordBox = new VexChords.ChordBox('#chord-box', {
        width: 200,
        height: 200,
      });
      chordBox.draw(chord);
    }

    renderChord();
  </script>
</body>
</html>
